<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이유씨엔씨 영업관리 대시보드</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;background:#F0F2F5;color:#263238;min-height:100vh}
.header{background:linear-gradient(135deg,#1B2A3D,#2C4158);padding:24px 28px 18px;color:#fff;display:flex;align-items:center;gap:12px}
.header-icon{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:20px}
.header-info{flex:1}
.header h1{font-size:22px;font-weight:800;letter-spacing:-.5px}
.header p{font-size:13px;opacity:.7}
.header-right{display:flex;align-items:center;gap:10px}
.hbtn{background:rgba(255,255,255,.12);border:none;color:#fff;padding:7px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit}
.hbtn:hover{background:rgba(255,255,255,.22)}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.status-txt{font-size:12px;opacity:.7}
.tabs{background:#fff;border-bottom:1px solid #E0E0E0;display:flex;padding:0 24px;overflow-x:auto}
.tab{padding:14px 20px;font-size:14px;font-weight:500;color:#999;background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;white-space:nowrap;font-family:inherit}
.tab.active{color:#1B2A3D;font-weight:700;border-bottom-color:#1B2A3D}
.content{max-width:1100px;margin:0 auto;padding:24px 16px}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px}
.stat-card{background:#fff;border-radius:14px;padding:20px 22px;box-shadow:0 1px 4px rgba(0,0,0,.06);border:1px solid #E8E8E8}
.stat-label{font-size:13px;color:#888;margin-bottom:6px}
.stat-value{font-size:32px;font-weight:800}
.filter-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.pill{padding:7px 16px;border-radius:20px;border:1px solid #DDD;background:#fff;color:#666;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
.pill.active{background:#37474F;border-color:#37474F;color:#fff}
.search-box{flex:1;min-width:200px;padding:8px 16px;border-radius:10px;border:1px solid #DDD;font-size:14px;outline:none;font-family:inherit}
.search-box:focus{border-color:#1565C0}
.bid-card{background:#fff;border-radius:14px;padding:18px 22px;box-shadow:0 1px 3px rgba(0,0,0,.04);border:1px solid #EEE;margin-bottom:10px;border-left:4px solid #BDBDBD}
.bid-card.s-입찰중{border-left-color:#4CAF50}
.bid-card.s-마감임박{border-left-color:#FF9800}
.bid-title{font-size:15px;font-weight:700;color:#263238;line-height:1.4;flex:1}
.bid-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;flex-wrap:wrap;gap:8px}
.bid-meta{display:flex;gap:16px;flex-wrap:wrap;font-size:13px;color:#78909C;margin-bottom:6px}
.bid-tags{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 11px;border-radius:16px;font-size:12px;font-weight:600}
.badge-status{padding:4px 12px;border-radius:20px;font-size:13px;font-weight:600}
.b-입찰중{background:#E8F5E9;color:#2E7D32}.b-마감임박{background:#FFF3E0;color:#E65100}.b-마감{background:#F5F5F5;color:#9E9E9E}
.kw-tag{background:#E8F5E9;color:#2E7D32;padding:2px 10px;border-radius:8px;font-size:12px;font-weight:600}
.cat-tag{background:#E3F2FD;color:#1565C0;padding:2px 10px;border-radius:8px;font-size:12px;font-weight:600}
.bid-link{font-size:12px;color:#1565C0;font-weight:600;text-decoration:none;margin-left:auto}
.bid-link:hover{text-decoration:underline}
.empty{text-align:center;padding:60px 20px;color:#999}
.empty-icon{font-size:48px;margin-bottom:16px}
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal-box{background:#fff;border-radius:18px;padding:28px;max-width:500px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-box h2{font-size:18px;font-weight:800;color:#1B2A3D;margin-bottom:8px}
.modal-box p{font-size:13px;color:#546E7A;line-height:1.8;margin-bottom:16px}
.modal-box input{width:100%;padding:12px 14px;border:1px solid #DDD;border-radius:10px;font-size:14px;margin-bottom:12px;outline:none;font-family:inherit;box-sizing:border-box}
.mbtn{width:100%;padding:13px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:8px}
.mbtn-primary{background:#1B2A3D;color:#fff}
.mbtn-secondary{background:#F5F5F5;color:#546E7A;font-size:14px;font-weight:600}
.bar-wrap{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.bar-label{width:40px;font-size:14px;font-weight:600;color:#455A64;text-align:right}
.bar-track{flex:1;height:28px;background:#ECEFF1;border-radius:8px;overflow:hidden}
.bar-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,#1565C0,#42A5F5)}
.bar-val{width:80px;font-size:13px;font-weight:600;color:#37474F;text-align:right}
table{width:100%;border-collapse:separate;border-spacing:0;background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);border:1px solid #E8E8E8}
th{padding:12px 16px;font-size:13px;font-weight:700;color:#455A64;text-align:left;background:#F5F7FA;border-bottom:2px solid #E0E0E0}
td{padding:12px 16px;font-size:13px}
tr:nth-child(even){background:#FAFBFC}
select{padding:7px 14px;border-radius:10px;border:1px solid #DDD;font-size:13px;background:#fff;font-family:inherit}
.half-badge{padding:3px 10px;border-radius:12px;font-weight:600;font-size:12px}
.dm-card{background:#fff;border-radius:14px;padding:18px 22px;box-shadow:0 1px 4px rgba(0,0,0,.05);border:1px solid #EEE;margin-bottom:10px}
.footer{text-align:center;padding:20px;font-size:12px;color:#999}
@media(max-width:640px){.header{flex-wrap:wrap;padding:18px 16px 14px}.stat-grid{grid-template-columns:1fr 1fr}.bid-meta{gap:8px}}
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🏗️</div>
  <div class="header-info"><h1>이유씨엔씨 영업관리</h1><p>단차열 페인트 · 공공영업 대시보드</p></div>
  <div class="header-right">
    <span class="dot" id="statusDot" style="background:#9E9E9E"></span>
    <span class="status-txt" id="statusTxt">미연결</span>
    <button class="hbtn" onclick="refreshData()">🔄 새로고침</button>
    <button class="hbtn" onclick="openSetup()">⚙️</button>
  </div>
</div>

<div class="tabs" id="tabBar"></div>
<div class="content" id="content"></div>
<div class="footer" id="footer"></div>

<div class="modal-bg" id="modal" style="display:none">
  <div class="modal-box">
    <h2>웹앱 URL 연동 설정</h2>
    <p>Apps Script → [배포] → [새 배포] → 웹 앱<br>실행 주체: 본인 / 액세스: 모든 사용자<br>→ [배포] 후 URL을 아래에 붙여넣으세요.</p>
    <input id="urlInput" placeholder="https://script.google.com/macros/s/xxxxx/exec" />
    <button class="mbtn mbtn-primary" onclick="saveUrl()">연결하기</button>
    <button class="mbtn mbtn-secondary" onclick="closeSetup()">닫기</button>
  </div>
</div>

<script>
// ─── State ───
let TAB = 0, BIDS = [], LOADING = false, CONNECTED = false, FILTER = "전체", SEARCH = "";
let BUD_REGION = "전체", BUD_CAT = "전체", BUD_SORT = "budget";
let DM_TYPE = "전체", DM_STATUS = "전체";
const URL_KEY = "euc_webapp_url";

const BUDGETS = [
  {id:1,region:"서울",org:"서울특별시",dept:"건축과",item:"공공건축물 에너지효율 개선",budget:52000,category:"건축",half:"상반기",note:"쿨루프 포함 가능"},
  {id:2,region:"경기",org:"수원시",dept:"건설과",item:"노후건축물 옥상방수 보수",budget:18000,category:"건축",half:"상반기",note:"차열도료 제안 가능"},
  {id:3,region:"부산",org:"부산광역시",dept:"녹색환경과",item:"쿨루프 시범사업",budget:35000,category:"환경",half:"상반기",note:"쿨루프 전용예산"},
  {id:4,region:"인천",org:"인천광역시",dept:"에너지정책과",item:"건물에너지 효율화",budget:28000,category:"에너지",half:"하반기",note:"차열페인트 포함"},
  {id:5,region:"대전",org:"대전광역시",dept:"건축과",item:"공공시설물 지붕개량",budget:12000,category:"건축",half:"상반기",note:"도장공사 항목"},
  {id:6,region:"광주",org:"광주광역시",dept:"환경정책과",item:"온실가스 감축사업",budget:41000,category:"환경",half:"하반기",note:"쿨루프 예산 편성"},
  {id:7,region:"대구",org:"대구광역시",dept:"시설관리과",item:"청사 유지보수",budget:8500,category:"시설",half:"상반기",note:"옥상방수 포함"},
  {id:8,region:"경기",org:"성남시",dept:"건축과",item:"그린리모델링 지원",budget:22000,category:"건축",half:"상반기",note:"차열도료 적용 가능"},
  {id:9,region:"서울",org:"서울시교육청",dept:"시설과",item:"학교시설 옥상방수",budget:67000,category:"교육",half:"상반기",note:"교육청 대규모 예산"},
  {id:10,region:"경기",org:"경기도교육청",dept:"시설관리과",item:"학교건물 에너지절감",budget:45000,category:"교육",half:"하반기",note:"차열페인트 제안 적합"},
];
const CONTACTS = [
  {id:1,type:"지자체",org:"서울특별시 강남구청",dept:"건축과",name:"김OO",position:"주무관",phone:"02-3423-XXXX",email:"kim@gangnam.go.kr",address:"서울특별시 강남구 학동로 426",dmSent:true,dmDate:"2026-03-01",note:"관심 표현"},
  {id:2,type:"지자체",org:"부산광역시 해운대구청",dept:"녹색환경과",name:"이OO",position:"담당",phone:"051-749-XXXX",email:"lee@haeundae.go.kr",address:"부산광역시 해운대구 해운대로 596",dmSent:true,dmDate:"2026-02-15",note:"샘플 요청"},
  {id:3,type:"교육청",org:"서울시교육청",dept:"시설과",name:"박OO",position:"주무관",phone:"02-3999-XXXX",email:"park@sen.go.kr",address:"서울특별시 종로구 송월길 48",dmSent:false,dmDate:null,note:""},
  {id:4,type:"교육지원청",org:"강남서초교육지원청",dept:"교육시설과",name:"최OO",position:"팀장",phone:"02-3440-XXXX",email:"choi@gangseo.sen.go.kr",address:"서울특별시 서초구 서초중앙로 118",dmSent:false,dmDate:null,note:""},
  {id:5,type:"공공기관",org:"한국토지주택공사(LH)",dept:"시설관리처",name:"정OO",position:"대리",phone:"055-922-XXXX",email:"jung@lh.or.kr",address:"경상남도 진주시 충의로 19",dmSent:true,dmDate:"2026-03-10",note:"견적 요청 받음"},
  {id:6,type:"지자체",org:"인천광역시 남동구청",dept:"건설과",name:"한OO",position:"주무관",phone:"032-453-XXXX",email:"han@namdong.go.kr",address:"인천광역시 남동구 소래로 633",dmSent:false,dmDate:null,note:""},
];

// ─── Helpers ───
function esc(s){const d=document.createElement("div");d.textContent=String(s||"");return d.innerHTML;}
function calcStatus(dl){
  if(!dl)return"마감";try{const d=new Date(String(dl).trim());if(isNaN(d))return"마감";
  const diff=(d-new Date())/864e5;if(diff>3)return"입찰중";if(diff>0)return"마감임박";}catch(e){}return"마감";
}
function setStatus(state,extra){
  const dot=document.getElementById("statusDot"),txt=document.getElementById("statusTxt");
  if(state==="ok"){dot.style.background="#4CAF50";txt.textContent="연결됨 · "+(extra||0)+"건";}
  else if(state==="loading"){dot.style.background="#FF9800";txt.textContent="불러오는 중...";}
  else if(state==="error"){dot.style.background="#E53935";txt.textContent="연결 실패";}
  else{dot.style.background="#9E9E9E";txt.textContent="미연결";}
}

// ─── Data ───
function getUrl(){return localStorage.getItem(URL_KEY)||"";}
async function refreshData(){
  const url=getUrl();if(!url){openSetup();return;}
  LOADING=true;setStatus("loading");render();
  try{
    const res=await fetch(url);const json=await res.json();
    if(json.success){BIDS=json.data||[];CONNECTED=true;setStatus("ok",json.count||0);}
    else{CONNECTED=false;setStatus("error");}
  }catch(e){CONNECTED=false;setStatus("error");}
  LOADING=false;render();
}
function openSetup(){document.getElementById("modal").style.display="flex";document.getElementById("urlInput").value=getUrl();}
function closeSetup(){document.getElementById("modal").style.display="none";}
function saveUrl(){
  const v=document.getElementById("urlInput").value.trim();
  if(!v.includes("script.google.com")){alert("올바른 Apps Script URL을 입력해주세요.");return;}
  localStorage.setItem(URL_KEY,v);closeSetup();refreshData();
}

// ─── Tabs ───
function switchTab(i){TAB=i;render();}

// ─── Render ───
function render(){
  // tabs
  let tb="";["📋 공고 모니터링","💰 예산 대시보드","👥 담당자·DM 관리"].forEach((t,i)=>{
    tb+=`<button class="tab ${TAB===i?"active":""}" onclick="switchTab(${i})">${t}</button>`;
  });
  document.getElementById("tabBar").innerHTML=tb;

  // content
  const el=document.getElementById("content");
  if(TAB===0)el.innerHTML=renderBids();
  else if(TAB===1)el.innerHTML=renderBudget();
  else el.innerHTML=renderContacts();

  // footer
  document.getElementById("footer").innerHTML=CONNECTED
    ?`나라장터 실시간 연동 중 · ${BIDS.length}건 수집됨`
    :"웹앱 URL을 연결하면 실시간 데이터가 표시됩니다";

  bindEvents();
}

function bindEvents(){
  document.querySelectorAll("[data-bid-filter]").forEach(b=>b.onclick=()=>{FILTER=b.dataset.bidFilter;render();});
  const s=document.getElementById("bidSearch");if(s){s.value=SEARCH;s.oninput=e=>{SEARCH=e.target.value;render();};}
  const br=document.getElementById("budRegion");if(br){br.value=BUD_REGION;br.onchange=e=>{BUD_REGION=e.target.value;render();};}
  const bc=document.getElementById("budCat");if(bc){bc.value=BUD_CAT;bc.onchange=e=>{BUD_CAT=e.target.value;render();};}
  const bs=document.getElementById("budSort");if(bs){bs.value=BUD_SORT;bs.onchange=e=>{BUD_SORT=e.target.value;render();};}
  document.querySelectorAll("[data-dm-type]").forEach(b=>b.onclick=()=>{DM_TYPE=b.dataset.dmType;render();});
  document.querySelectorAll("[data-dm-status]").forEach(b=>b.onclick=()=>{DM_STATUS=b.dataset.dmStatus;render();});
}

// ─── Tab 1: 공고 모니터링 ───
function renderBids(){
  if(!CONNECTED&&BIDS.length===0&&!LOADING){
    return `<div class="empty"><div class="empty-icon">🔗</div>
      <div style="font-size:18px;font-weight:700;color:#263238;margin-bottom:8px">나라장터 데이터 연동</div>
      <div style="font-size:14px;color:#78909C;line-height:1.7;margin-bottom:24px">Apps Script 웹앱 URL을 연결하면<br>실제 수집된 공고 데이터가 여기에 표시됩니다.</div>
      <button onclick="openSetup()" style="padding:12px 28px;border-radius:10px;border:none;background:#1B2A3D;color:#fff;font-size:15px;font-weight:700;cursor:pointer">웹앱 URL 연결하기</button></div>`;
  }
  if(LOADING)return`<div style="text-align:center;padding:60px;color:#90A4AE;font-size:14px">데이터를 불러오는 중...</div>`;

  const enriched=BIDS.map((b,i)=>({...b,_s:calcStatus(b["입찰마감일시"]),_id:b["입찰공고번호"]||"r"+i}));
  const filtered=enriched.filter(b=>{
    if(FILTER!=="전체"&&b._s!==FILTER)return false;
    if(SEARCH){const s=SEARCH.toLowerCase();if(![b["공고명"],b["공고기관"],b["수요기관"],b["키워드"],b["구분"]].join(" ").toLowerCase().includes(s))return false;}
    return true;
  });
  const total=enriched.length,active=enriched.filter(b=>b._s==="입찰중").length,urgent=enriched.filter(b=>b._s==="마감임박").length;

  let h=`<div class="stat-grid">
    <div class="stat-card"><div class="stat-label">📋 전체 수집 공고</div><div class="stat-value" style="color:#455A64">${total}</div></div>
    <div class="stat-card"><div class="stat-label">🟢 입찰 진행중</div><div class="stat-value" style="color:#2E7D32">${active}</div></div>
    <div class="stat-card"><div class="stat-label">🔴 마감 임박</div><div class="stat-value" style="color:#E65100">${urgent}</div></div>
  </div>`;

  h+=`<div class="filter-bar">`;
  ["전체","입찰중","마감임박","마감"].forEach(f=>{h+=`<button class="pill ${FILTER===f?"active":""}" data-bid-filter="${f}">${f}</button>`;});
  h+=`<input class="search-box" id="bidSearch" placeholder="공고명, 기관명, 키워드 검색..."></div>`;

  if(filtered.length===0){
    h+=`<div class="empty">${BIDS.length===0?"수집된 공고가 없습니다. Apps Script에서 testRun 실행 후 새로고침하세요.":"검색 결과가 없습니다"}</div>`;
  } else {
    filtered.forEach(b=>{
      const link=b["나라장터링크"]||"";
      h+=`<div class="bid-card s-${b._s}">
        <div class="bid-top"><div class="bid-title">${esc(b["공고명"]||"공고명 없음")}</div>
        <span class="badge-status b-${b._s}">${b._s}</span></div>
        <div class="bid-meta">
          <span>🏢 ${esc(b["공고기관"]||"-")}</span>
          ${b["수요기관"]&&b["수요기관"]!==b["공고기관"]?`<span>🏛️ ${esc(b["수요기관"])}</span>`:""}
          <span>💰 ${esc(b["추정가격"]||"-")}</span>
          <span>📅 마감: ${esc(b["입찰마감일시"]||"-")}</span>
        </div>
        <div class="bid-tags">
          ${b["키워드"]?`<span class="kw-tag">#${esc(b["키워드"])}</span>`:""}
          ${b["구분"]?`<span class="cat-tag">${esc(b["구분"])}</span>`:""}
          ${b["계약방법"]?`<span style="font-size:12px;color:#90A4AE">${esc(b["계약방법"])}</span>`:""}
          ${link?`<a class="bid-link" href="${esc(link)}" target="_blank" rel="noopener">나라장터 →</a>`:""}
        </div></div>`;
    });
  }
  return h;
}

// ─── Tab 2: 예산 대시보드 ───
function renderBudget(){
  const regions=["전체",...new Set(BUDGETS.map(b=>b.region))];
  const cats=["전체",...new Set(BUDGETS.map(b=>b.category))];
  let list=BUDGETS.filter(b=>{if(BUD_REGION!=="전체"&&b.region!==BUD_REGION)return false;if(BUD_CAT!=="전체"&&b.category!==BUD_CAT)return false;return true;});
  list.sort((a,b)=>BUD_SORT==="budget"?b.budget-a.budget:a.org.localeCompare(b.org));
  const total=list.reduce((s,b)=>s+b.budget,0);
  const rSum={};BUDGETS.forEach(b=>{rSum[b.region]=(rSum[b.region]||0)+b.budget;});
  const maxR=Math.max(...Object.values(rSum));

  let h=`<div class="stat-grid">
    <div class="stat-card"><div class="stat-label">💰 총 파악 예산</div><div class="stat-value" style="color:#1565C0">${(total/10000).toFixed(1)}억원</div></div>
    <div class="stat-card"><div class="stat-label">🏢 대상 기관 수</div><div class="stat-value" style="color:#2E7D32">${list.length}개</div></div>
    <div class="stat-card"><div class="stat-label">📊 평균 예산 규모</div><div class="stat-value" style="color:#6A1B9A">${list.length?Math.round(total/list.length).toLocaleString():0}만원</div></div>
  </div>`;

  h+=`<div style="background:#fff;border-radius:14px;padding:22px;box-shadow:0 1px 4px rgba(0,0,0,.06);border:1px solid #E8E8E8;margin-bottom:24px">
    <div style="font-size:15px;font-weight:700;color:#263238;margin-bottom:16px">지역별 파악 예산 현황</div>`;
  Object.entries(rSum).sort((a,b)=>b[1]-a[1]).forEach(([r,v])=>{
    h+=`<div class="bar-wrap"><div class="bar-label">${r}</div><div class="bar-track"><div class="bar-fill" style="width:${(v/maxR)*100}%"></div></div><div class="bar-val">${(v/10000).toFixed(1)}억</div></div>`;
  });
  h+=`</div>`;

  h+=`<div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap">
    <select id="budRegion">${regions.map(r=>`<option value="${r}">${r==="전체"?"전체 지역":r}</option>`).join("")}</select>
    <select id="budCat">${cats.map(c=>`<option value="${c}">${c==="전체"?"전체 분야":c}</option>`).join("")}</select>
    <select id="budSort"><option value="budget">예산 높은순</option><option value="org">기관명순</option></select>
  </div>`;

  h+=`<div style="overflow-x:auto"><table><thead><tr>`;
  ["지역","기관","부서","예산항목","예산(만원)","시기","메모"].forEach(c=>{h+=`<th>${c}</th>`;});
  h+=`</tr></thead><tbody>`;
  list.forEach(b=>{
    const hc=b.half==="상반기"?"background:#E3F2FD;color:#1565C0":"background:#F3E5F5;color:#6A1B9A";
    h+=`<tr><td>${b.region}</td><td style="font-weight:600">${b.org}</td><td style="color:#546E7A">${b.dept}</td><td>${b.item}</td><td style="font-weight:700;color:#1565C0">${b.budget.toLocaleString()}</td><td><span class="half-badge" style="${hc}">${b.half}</span></td><td style="color:#78909C;font-size:12px">${b.note}</td></tr>`;
  });
  h+=`</tbody></table></div>`;
  return h;
}

// ─── Tab 3: 담당자·DM 관리 ───
function renderContacts(){
  const list=CONTACTS.filter(c=>{if(DM_TYPE!=="전체"&&c.type!==DM_TYPE)return false;if(DM_STATUS==="발송완료"&&!c.dmSent)return false;if(DM_STATUS==="미발송"&&c.dmSent)return false;return true;});
  const sent=CONTACTS.filter(c=>c.dmSent).length,pend=CONTACTS.filter(c=>!c.dmSent).length;

  let h=`<div class="stat-grid">
    <div class="stat-card"><div class="stat-label">👥 전체 담당자</div><div class="stat-value" style="color:#263238">${CONTACTS.length}명</div></div>
    <div class="stat-card"><div class="stat-label">📬 DM 발송완료</div><div class="stat-value" style="color:#1565C0">${sent}건</div></div>
    <div class="stat-card"><div class="stat-label">📭 미발송 잔여</div><div class="stat-value" style="color:#E65100">${pend}건</div></div>
  </div>`;

  h+=`<div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap"><div style="display:flex;gap:6px">`;
  ["전체","지자체","교육청","교육지원청","공공기관"].forEach(t=>{h+=`<button class="pill ${DM_TYPE===t?"active":""}" data-dm-type="${t}">${t}</button>`;});
  h+=`</div><div style="display:flex;gap:6px;margin-left:auto">`;
  ["전체","발송완료","미발송"].forEach(d=>{h+=`<button class="pill ${DM_STATUS===d?"active":""}" data-dm-status="${d}" style="${DM_STATUS===d?"background:#E3F2FD;border-color:#1565C0;color:#1565C0":""}">${d}</button>`;});
  h+=`</div></div>`;

  list.forEach(c=>{
    const bc=c.type==="지자체"?"#1565C0":c.type==="교육청"?"#6A1B9A":c.type==="교육지원청"?"#00838F":"#E65100";
    const dmBadge=c.dmSent?`<span style="display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:16px;background:#E3F2FD;color:#1565C0;font-size:12px;font-weight:600">✓ 발송완료</span>`
      :`<span style="display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:16px;background:#FFF8E1;color:#F57F17;font-size:12px;font-weight:600">○ 미발송</span>`;
    h+=`<div class="dm-card" style="border-left:4px solid ${bc}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;flex-wrap:wrap;gap:8px">
        <div><div style="font-size:16px;font-weight:700;color:#263238">${esc(c.org)}</div><div style="font-size:13px;color:#78909C;margin-top:2px">${esc(c.dept)} · ${esc(c.name)} ${esc(c.position)}</div></div>
        ${dmBadge}
      </div>
      <div style="display:flex;gap:16px;flex-wrap:wrap;font-size:13px;color:#546E7A;margin-bottom:8px"><span>📞 ${esc(c.phone)}</span><span>✉️ ${esc(c.email)}</span></div>
      <div style="font-size:13px;color:#78909C;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px"><span>📍 ${esc(c.address)}</span>${c.dmSent?`<span style="font-size:12px;color:#90A4AE">발송일: ${c.dmDate}</span>`:""}</div>
      ${c.note?`<div style="margin-top:8px;padding:6px 12px;background:#FFF8E1;border-radius:8px;font-size:12px;color:#F57F17">💡 ${esc(c.note)}</div>`:""}
    </div>`;
  });
  return h;
}

// ─── Init ───
window.addEventListener("DOMContentLoaded",()=>{
  render();
  if(getUrl())refreshData();
});
</script>
</body>
</html>
